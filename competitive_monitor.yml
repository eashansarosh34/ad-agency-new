name: Competitive Monitor

on:
  schedule:
    - cron: '0 6 * * *'   # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Run competitive monitor
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 run_competitive_monitor.py

      # trend_state.json is how this agent knows what it already saw last
      # time — without saving it back, it would think everything is "new"
      # on every single run.
      - name: Save trend state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trend_state.json new_concepts_from_trend_shift.json
          git diff --staged --quiet || git commit -m "Update trend state [auto]"
          git push
