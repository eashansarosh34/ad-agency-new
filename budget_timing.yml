name: Budget Timing Intelligence
on:
  schedule:
    - cron: '0 7 * * 1'   # weekly, Monday
  workflow_dispatch:
permissions:
  contents: write
jobs:
  timing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Run budget timing
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: python3 agent_35_budget_timing.py
