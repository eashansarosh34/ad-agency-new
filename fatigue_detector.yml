name: Creative Fatigue Detector
on:
  schedule:
    - cron: '0 8 * * *'   # daily
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fatigue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Run fatigue detector
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: python3 agent_34_fatigue_detector.py
